<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background-color: #FCF6D9;">
    <header style="background-color: #9CC6DB;
    padding: 10px;
    text-align: center;">
        <h1>Status Updates.</h1>  

        <nav style="margin-top: 15px;">
            <a href="index.html" style="margin: 0 15px; text-decoration: none; color: #333; font-weight: 500; transition: color 0.3s;">Home</a>
            <a href="profile.html" style="margin: 0 15px; text-decoration: none; color: #333; font-weight: 500; transition: color 0.3s;">Profile</a>
            <a href="status.html" style="margin: 0 15px; text-decoration: none; color: #333; font-weight: 500; transition: color 0.3s;">Status</a>
            <a href="download.html" style="margin: 0 15px; text-decoration: none; color: #333; font-weight: 500; transition: color 0.3s;">Download</a>
        </nav>

      
    </header>
    <main style="padding: 20px;">
        <br><br>
        <h1 style="color: #333;">Welcome to your Status Page!</h1>
        <section style="margin-top: 30px; padding: 20px; background-color: #E8F4F8; border-radius: 8px;">
            <h2>Your Gains</h2>
            <input type="text" placeholder="Add your achievement or gain..." style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <button type="submit">Log Gain</button>
        </section>

        <section style="margin-top: 30px; padding: 20px; background-color: #FFF9E6; border-radius: 8px;">
            <h2>Latest News</h2>
            <div style="border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 4px;">
                <img src="/image/spider-man.jpeg" alt="Spider-Man News" style="width: 150px; height: auto; margin-bottom: 10px; border-radius: 4px;">
                <h3>News Title</h3>
                <p>Spider-Man is back in action!<br>
                watch the new amazing movie  to learn the ropes too.</p>
                <a href="#">Read more</a>
            </div>
        </section>

        <section style="margin-top: 30px; padding: 20px; background-color: #F0F8F0; border-radius: 8px;">
            <h2>Journal</h2>
            <textarea placeholder="Write your thoughts and reflections here..." rows="6" style="width: 100%; padding: 10px; border-radius: 4px;"></textarea><br><br>
            <button type="submit">Save Journal Entry</button>
        </section>
        
</body>
