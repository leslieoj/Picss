<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background-color: #F6F0D7;">
    <header style="background-color: #97A87A;
    padding: 10px;
    text-align: center;">
        <h1>Profile.</h1>  

        <nav
        style="display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background-color: #A8BBA3;">
            <a href="index.html">Home</a>
            <a href="profile.html">Profile</a>
           
            <a href="status.html">Status</a>
            <a href="download.html">Download</a>
        </nav>
    </header>
    <main style="padding: 20px; min-height: calc(100vh - 250px);">
        <h2>My Profile</h2>
        <p>Welcome to your profile page!</p>

        <div class="profile-info" style="margin-bottom: 30px; padding: 15px; background-color: #E8E3D3; border-radius: 5px;">
            <p><strong>Name:</strong> <span id="displayName">Baller 1.</span></p>
            <p><strong>Email:</strong> baller1.@patrion.com</p>
            <p><strong>Location:</strong> Not set</p>
            <p><strong>Bio:</strong> Not set</p>
        </div>

        <form class="profile-form" style="max-width: 400px; padding: 15px; background-color: #E8E3D3; border-radius: 5px;">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="Baller 1." style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #999; border-radius: 4px;"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="baller1.@patrion.com" style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #999; border-radius: 4px;"><br><br>

            <label for="location">Location:</label>
            <input type="text" id="location" name="location" placeholder="Enter your location" style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #999; border-radius: 4px;"><br><br>

            <label for="bio">Bio:</label>
            <textarea id="bio" name="bio" placeholder="Tell us about yourself" style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #999; border-radius: 4px; resize: vertical;"></textarea><br><br>

            <input type="submit" value="Update Profile" style="padding: 10px 20px; background-color: #97A87A; color: white; border: none; border-radius: 4px; cursor: pointer;">
        </form>
    </main>

    <script>
        document.querySelector('.profile-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('displayName').textContent = document.getElementById('name').value;
            alert('Profile updated successfully!');
        });
    </script>
</body>
<footer style="background-color: #FCF9EA;
    padding: 10px;
    text-align: center;">
    <p>&copy; 2026 Leslie Ojuma. All rights reserved.</p>
 </footer>
</html>
